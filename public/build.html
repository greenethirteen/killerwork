<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Build a KillerWork™ Portfolio</title>
  <link rel="stylesheet" href="/ui.css" />
</head>
<body>
  <main class="builder-shell">
    <nav class="topbar" aria-label="KillerWork">
      <a class="logo" href="/">KillerWork™</a>
      <div class="topnav-actions">
        <a href="/">Import</a>
        <a data-manage-latest class="hidden" href="#">Manage portfolio</a>
        <span data-user-badge class="user-badge hidden"></span>
        <a data-auth-link class="auth-button" href="#">Sign up / sign in</a>
        <button data-auth-logout class="auth-button hidden" type="button">Sign out</button>
      </div>
    </nav>

    <header class="builder-header">
      <a class="back-home" href="/">← Home</a>
      <h1>Upload the ads.<br>Get a portfolio.</h1>
    </header>

    <form id="campaignBuilder" class="builder-simple">
      <section class="builder-panel">
        <div id="campaignList" class="campaign-list"></div>
        <button id="addCampaign" class="add-campaign-button" type="button" aria-label="Add campaign page">+</button>
        <button id="buildCampaigns" class="build-submit" type="submit">Build portfolio</button>
      </section>
    </form>

    <section id="progressPanel" class="glass progress-panel hidden">
      <div class="panel-top">
        <div><span class="status-pill" id="statusPill">Waiting</span><h2 id="stageTitle">Ready to build</h2><p id="stageDetail">Add a campaign to begin.</p></div>
        <div class="percent" id="percentText">0%</div>
      </div>
      <div class="progress-track"><div id="progressBar" class="progress-bar"></div></div>
      <pre id="logBox" class="logs"></pre>
      <div id="actions" class="actions hidden">
        <a id="editorLink" class="button" target="_blank">Edit generated site</a>
        <a id="previewLink" class="button secondary" target="_blank">Preview site</a>
        <a id="manageLink" class="button secondary" target="_blank">Manage projects</a>
        <a id="downloadLink" class="button hot">Download ZIP</a>
      </div>
    </section>
  </main>
  <template id="campaignTemplate">
    <article class="campaign-card">
      <div class="campaign-card-top">
        <h2>Campaign <span data-campaign-number>1</span></h2>
        <button class="mini-button danger remove-campaign" type="button">Remove</button>
      </div>
      <label class="asset-drop">
        <strong>Upload or drag ads here</strong>
        <small>Images, video, audio/radio spots, and PDFs</small>
        <input data-field="files" type="file" multiple accept="image/*,video/*,audio/*,application/pdf" required>
        <span data-file-summary>No files selected</span>
      </label>
      <label class="builder-field">
        <span>Campaign prompt</span>
        <textarea data-field="notes" required placeholder="Tell KillerWork™ what this campaign is. Example: Some things are meant to be in pairs. Testicular Cancer Awareness. Sri Lanka Cancer Society. Ogilvy Sri Lanka. Use the print ads as a slider."></textarea>
      </label>
    </article>
  </template>
  <script type="module">
    import('/auth.js').then(() => import('/build.js'));
  </script>
</body>
</html>
