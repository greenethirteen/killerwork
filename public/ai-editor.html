<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KillaWork™ AI Editor</title>
  <link rel="stylesheet" href="/ui.css" />
</head>
<body class="ai-editor-body">
  <main class="ai-editor-shell">
    <aside class="ai-chat-sidebar" aria-label="AI website editor">
      <div class="ai-sidebar-head">
        <a class="home-icon-button" href="/" aria-label="Home">
          <svg aria-hidden="true" viewBox="0 0 24 24" width="18" height="18">
            <path d="M3 10.8 12 3l9 7.8V21h-6v-6H9v6H3V10.8Z" fill="none" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/>
          </svg>
        </a>
        <div class="ai-sidebar-title">
          <span>KillaWork™ AI</span>
          <strong>Build with prompts</strong>
        </div>
      </div>
      <div class="ai-page-switcher">
        <label class="ai-page-label" for="aiPageSelect">Current page</label>
        <div class="ai-page-picker">
          <select id="aiPageSelect" aria-label="Page"></select>
          <button id="aiNewPage" type="button" class="ai-icon-button primary" aria-label="Create new campaign" title="Create new campaign">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"/></svg>
          </button>
        </div>
      </div>
      <div class="ai-quick-prompts" aria-label="Suggested edits">
        <button type="button" data-prompt="Make this page feel more premium and portfolio-ready.">Premium</button>
        <button type="button" data-prompt="Break the credits into clean individual lines.">Credits</button>
        <button type="button" data-prompt="Reduce the headline size slightly.">Headline</button>
        <button type="button" data-prompt="Reorder the work so the strongest pieces appear first.">Reorder</button>
      </div>
      <section id="aiChatLog" class="ai-chat-log" aria-live="polite"></section>
      <form id="aiPromptForm" class="ai-chat-form">
        <label for="aiPrompt">Ask KillaWork™ AI</label>
        <textarea id="aiPrompt" rows="5" placeholder="Ask for copy, structure, title, ordering, or styling changes and I’ll update the preview here."></textarea>
        <div id="aiAttachmentList" class="ai-attachment-list" aria-live="polite"></div>
        <button id="aiApply" type="submit">Generate edit</button>
        <div class="ai-tool-row" aria-label="Editor controls">
          <label class="ai-icon-button" aria-label="Upload ads" title="Upload ads">
            <input id="aiAssetUpload" type="file" multiple accept="image/*,video/*,audio/*,application/pdf" />
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M12 16V4M7 9l5-5 5 5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M5 16v3h14v-3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </label>
          <button id="aiUndo" type="button" class="ai-icon-button" disabled aria-label="Undo" title="Undo">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M9 7 4 12l5 5M5 12h9a6 6 0 0 1 6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="aiRedo" type="button" class="ai-icon-button" disabled aria-label="Redo" title="Redo">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m15 7 5 5-5 5M19 12h-9a6 6 0 0 0-6 6" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
          <button id="aiSave" type="button" class="ai-icon-button primary" aria-label="Save" title="Save">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M5 3h12l2 2v16H5V3Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/><path d="M8 3v6h8M8 18h8" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </button>
          <a id="classicEditorLink" class="ai-icon-button" href="#" aria-label="Classic editor" title="Classic editor">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m4 20 4.5-1 10-10a2.2 2.2 0 0 0-3.1-3.1l-10 10L4 20Z" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linejoin="round"/><path d="m13.5 7.5 3 3" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </a>
          <a id="aiOpenPreview" class="ai-icon-button" href="#" target="_blank" rel="noopener" aria-label="Open preview" title="Open preview">
            <svg aria-hidden="true" viewBox="0 0 24 24"><path d="M14 4h6v6M20 4l-9 9" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/><path d="M20 14v5a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V5a1 1 0 0 1 1-1h5" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
          </a>
        </div>
        <p id="aiStatus" class="ai-status">Ask for an edit. The preview updates on the right.</p>
      </form>
    </aside>
    <section class="ai-preview-stage">
      <div class="ai-preview-topbar">
        <div>
          <span>Live preview</span>
          <strong id="aiPreviewTitle">Portfolio</strong>
        </div>
        <div class="ai-preview-actions">
          <a id="aiPreviewTopOpen" href="#" target="_blank" rel="noopener">Open preview</a>
        </div>
      </div>
      <iframe id="aiPreview" class="ai-preview" title="Live portfolio preview"></iframe>
    </section>
    <div id="aiPulse" class="ai-pulse hidden">Updating page</div>
  </main>
  <div id="aiNewPageModal" class="ai-modal hidden" role="dialog" aria-modal="true" aria-labelledby="aiNewPageTitleText">
    <form id="aiNewPageForm" class="ai-modal-card">
      <div class="ai-modal-head">
        <div>
          <span>New campaign</span>
          <h2 id="aiNewPageTitleText">Build a page with AI</h2>
        </div>
        <button id="aiCloseNewPage" type="button" class="ai-icon-button" aria-label="Close">
          <svg aria-hidden="true" viewBox="0 0 24 24"><path d="m6 6 12 12M18 6 6 18" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"/></svg>
        </button>
      </div>
      <label>
        Campaign title
        <input id="aiNewPageTitle" name="title" type="text" placeholder="Ikea - Sustainability" autocomplete="off" />
      </label>
      <label>
        Campaign info
        <textarea id="aiNewPagePrompt" name="prompt" rows="7" placeholder="Drop in the campaign description, credits, awards, case study notes, and any direction. KillaWork™ AI will build the page in this portfolio’s template."></textarea>
      </label>
      <label class="ai-file-drop">
        <input id="aiNewPageFiles" name="files" type="file" multiple accept="image/*,video/*,audio/*,application/pdf" />
        <strong>Upload ads, films, case studies or PDFs</strong>
        <span id="aiNewPageFileCount">No files selected.</span>
      </label>
      <div class="ai-modal-actions">
        <button id="aiCreatePage" type="submit">Create page</button>
        <button id="aiCancelNewPage" type="button" class="button ghost">Cancel</button>
      </div>
    </form>
  </div>
  <script type="module">
    import('/auth.js?v=20260524-popup').then(() => import('/ai-editor.js'));
  </script>
</body>
</html>
