<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KillaWork™ Page Editor</title>
  <link rel="stylesheet" href="/ui.css" />
</head>
<body>
  <main class="editor-shell">
    <aside class="editor-sidebar">
      <a class="logo editor-logo" href="/">
        <img class="logo-image" src="/logos/killa-work-logo.png" alt="KillaWork™ logo" />
        <span class="logo-text">KillaWork™</span>
      </a>
      <h1>Editor</h1>
      <a id="managePortfolio" class="button ghost sidebar-action" href="/">Manage projects</a>
      <div id="pageList" class="page-list"></div>
      <aside class="inspector-panel editor-sidebar-inspector">
        <div id="inspector" class="inspector-empty">Select a block.</div>
        <input id="mediaUpload" class="hidden" type="file" />
      </aside>
    </aside>
    <section class="editor-main">
      <div class="editor-toolbar">
        <input id="titleInput" type="text" placeholder="Select a page" />
        <div class="editor-actions">
          <a id="pagePreview" class="button ghost" target="_blank">Preview</a>
          <button id="savePage" type="button"><span>Save</span><small data-save-state>Saved</small></button>
        </div>
      </div>
      <div id="editorStatus" class="editor-status hidden" aria-live="polite">Choose a page to edit.</div>
      <div class="editor-workspace">
        <section class="editor-canvas-panel">
          <div class="canvas-actions">
            <button id="addTextBlock" class="button secondary" type="button">Add text</button>
            <button id="addImageBlock" class="button secondary" type="button">Add image</button>
            <button id="addVideoBlock" class="button secondary" type="button">Add video</button>
            <button id="addAudioBlock" class="button secondary" type="button">Add audio</button>
            <button id="addPdfBlock" class="button secondary" type="button">Add PDF</button>
            <button id="addSliderBlock" class="button secondary" type="button">Add slider</button>
          </div>
          <div id="blockEditor" class="block-editor"></div>
        </section>
      </div>
    </section>
    <div id="videoChoiceModal" class="editor-modal hidden" role="dialog" aria-modal="true" aria-labelledby="videoChoiceTitle">
      <div class="editor-modal-card">
        <h2 id="videoChoiceTitle">Add video</h2>
        <button class="button secondary" type="button" data-video-choice="upload">Upload video</button>
        <button class="button secondary" type="button" data-video-choice="youtube">Add from YouTube</button>
        <button class="button secondary" type="button" data-video-choice="vimeo">Add from Vimeo</button>
        <button class="button ghost" type="button" data-video-choice="cancel">Cancel</button>
      </div>
    </div>
  </main>
  <script type="module">
    import('/auth.js?v=20260524-popup').then(() => import('/editor.js'));
  </script>
</body>
</html>
