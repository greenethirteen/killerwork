<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KillerWork™ Page Editor</title>
  <link rel="stylesheet" href="/ui.css" />
</head>
<body>
  <main class="editor-shell">
    <aside class="editor-sidebar">
      <a class="back-home" href="/">KillerWork™</a>
      <h1>Editor</h1>
      <a id="managePortfolio" class="button ghost sidebar-action" href="/">Manage projects</a>
      <div id="pageList" class="page-list"></div>
    </aside>
    <section class="editor-main">
      <div class="editor-toolbar">
        <input id="titleInput" type="text" placeholder="Select a page" />
        <div class="editor-actions">
          <a id="pagePreview" class="button ghost" target="_blank">Preview</a>
          <button id="savePage" type="button">Save page</button>
        </div>
      </div>
      <div id="editorStatus" class="editor-status">Choose a page to edit.</div>
      <div class="editor-workspace">
        <section class="editor-canvas-panel">
          <div class="canvas-actions">
            <button id="addTextBlock" class="button secondary" type="button">Add text</button>
            <button id="addImageBlock" class="button secondary" type="button">Add image</button>
            <button id="addVideoBlock" class="button secondary" type="button">Add video</button>
            <button id="addAudioBlock" class="button secondary" type="button">Add audio</button>
            <button id="addPdfBlock" class="button secondary" type="button">Add PDF</button>
          </div>
          <div id="blockEditor" class="block-editor"></div>
        </section>
        <aside class="inspector-panel">
          <div id="inspector" class="inspector-empty">Select a block.</div>
          <input id="mediaUpload" class="hidden" type="file" />
        </aside>
      </div>
    </section>
  </main>
  <script src="/editor.js"></script>
</body>
</html>
