<!doctype html>
<html lang="en" class="auth-pending">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <script src="/tracking.js?v=20260604-clarity-direct"></script>
  <title>AI Portfolio Studio — KillaWork™</title>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
  <link rel="stylesheet" href="/ui.css?v=20260620-splash-smaller" />
  <style>
    .ai-studio-page { height: 100vh; overflow: hidden; background: #f6f5f2; color: #202124; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }

    /* ── Source tabs ── */
    .as-source-tabs { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
    .as-source-tab { display: flex; align-items: center; justify-content: center; gap: 6px; height: 34px; padding: 0 8px; border: 1.5px solid #dedbd4; border-radius: 8px; background: #fbfaf8; color: #62666d; font-size: 12.5px; font-weight: 850; cursor: pointer; transition: border-color .12s, background .12s, color .12s; white-space: nowrap; }
    .as-source-tab svg { flex-shrink: 0; }
    .as-source-tab.active { border-color: #1d7af2; background: #eef5ff; color: #1855b8; box-shadow: 0 0 0 2px rgba(29,122,242,.1); }
    .as-source-tab:hover:not(.active) { background: #f2f1ee; border-color: #c4c1ba; }

    /* ── Source panels ── */
    .as-source-panel { display: grid; }
    .as-source-panel.hidden { display: none; }
    .as-url-input { width: 100%; height: 34px; border: 1px solid #dedbd4; border-radius: 7px; background: #fbfaf8; color: #202124; padding: 0 10px; font: inherit; font-size: 13px; outline: none; box-sizing: border-box; }
    .as-url-input:focus { border-color: #1d7af2; box-shadow: 0 0 0 2px rgba(29,122,242,.12); }

    /* ── Setup shell (wraps everything above the prompt bar) ── */
    .as-setup { display: grid; gap: 8px; padding: 10px 10px 0; border-top: 1px solid #ece9e2; }

    /* ── Style cards ── */
    .as-style-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .as-style-card { position: relative; cursor: pointer; }
    .as-style-card input { position: absolute; opacity: 0; pointer-events: none; }
    .as-style-card-inner { border: 1.5px solid #dedbd4; border-radius: 9px; overflow: hidden; background: #f0eeea; transition: border-color .12s, box-shadow .12s; }
    .as-style-card input:checked ~ .as-style-card-inner { border-color: #1d7af2; box-shadow: 0 0 0 2.5px rgba(29,122,242,.14); }
    .as-style-card:hover:not(:has(input:checked)) .as-style-card-inner { border-color: #b0ada6; }
    .as-style-thumb { display: block; width: 100%; }
    .as-style-meta { padding: 5px 8px 7px; background: #fbfaf8; border-top: 1px solid #e8e5de; }
    .as-style-meta b { display: block; font-size: 12px; font-weight: 900; color: #202124; line-height: 1.2; }
    .as-style-meta small { display: block; color: #6d7179; font-size: 11px; line-height: 1.2; }
    .as-style-card input:checked ~ .as-style-card-inner .as-style-meta b { color: #1855b8; }

    /* ── Identity row ── */
    .as-identity { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
    .as-identity label { display: grid; gap: 3px; }
    .as-identity label:last-child { grid-column: 1 / -1; }
    .as-identity span { color: #6d7179; font-size: 10.5px; font-weight: 950; text-transform: uppercase; letter-spacing: .06em; }
    .as-identity input { height: 34px; border: 1px solid #dedbd4; border-radius: 7px; background: #fbfaf8; color: #202124; padding: 0 9px; font: inherit; font-size: 13px; outline: none; }
    .as-identity input:focus { border-color: #1d7af2; }

    /* ── Prompt bar (Replit-style bottom chat input) ── */
    .as-prompt-bar { display: flex; align-items: flex-end; gap: 8px; padding: 10px 10px 10px; background: #fff; border: 1px solid #c9c6bf; border-radius: 12px; margin: 8px 10px 10px; box-shadow: 0 8px 24px rgba(20,24,30,.07); }
    .as-prompt-textarea { flex: 1; min-height: 36px; max-height: 120px; border: 0; background: transparent; font: inherit; font-size: 14px; line-height: 1.45; resize: none; outline: none; color: #202124; overflow-y: auto; }
    .as-prompt-textarea::placeholder { color: #9097a0; }
    .as-prompt-send { flex-shrink: 0; display: flex; align-items: center; justify-content: center; width: 36px; height: 36px; border: 0; border-radius: 8px; background: #111; color: #fff; cursor: pointer; transition: background .12s; }
    .as-prompt-send:hover { background: #1d7af2; }
    .as-prompt-send:disabled { opacity: .45; cursor: not-allowed; background: #111; }

    /* ── Empty state ── */
    .as-empty-headline { font-size: clamp(32px,5vw,72px); line-height: .95; letter-spacing: -.02em; font-weight: 950; }
    .as-empty-sub { max-width: 420px; margin: 12px 0 0; color: rgba(247,242,234,.52); font-size: 15px; line-height: 1.4; }

    @media (max-width: 1000px) {
      .ai-studio-page { height: auto; overflow: auto; }
      .as-identity { grid-template-columns: 1fr; }
      .as-identity label:last-child { grid-column: auto; }
    }
  </style>
</head>
<body class="ai-studio-page zip-studio-page">
  <noscript><iframe src="https://www.googletagmanager.com/ns.html?id=GTM-NDCKPZ6Z" height="0" width="0" style="display:none;visibility:hidden" title="Google Tag Manager"></iframe></noscript>

  <main class="studio-shell" data-clarity-mask="true">

    <!-- ── Sidebar rail ─────────────────────────────────────────────── -->
    <aside class="studio-rail" aria-label="Workspace navigation">
      <a href="/" class="studio-rail-mark" title="KillaWork home">K</a>
      <span class="studio-rail-dot active"></span>
      <span class="studio-rail-dot"></span>
      <span class="studio-rail-dot"></span>
    </aside>

    <!-- ── Agent panel ──────────────────────────────────────────────── -->
    <section class="studio-agent" aria-label="AI portfolio builder">
      <header class="studio-agent-head">
        <div>
          <a class="studio-back" href="/">KillaWork™</a>
          <h1>AI Portfolio Studio</h1>
        </div>
        <div class="studio-auth">
          <a data-manage-latest class="hidden" href="/manage.html">Manage</a>
          <span data-user-badge class="user-badge hidden"></span>
          <a data-auth-link class="top-signin" href="#">Sign in</a>
          <button data-auth-logout class="auth-button hidden" type="button">Sign out</button>
        </div>
      </header>

      <!-- Build log feed — empty until build starts -->
      <div id="asFeed" class="studio-feed" aria-live="polite"></div>

      <!-- Setup section (source + style + identity) -->
      <form id="asForm" novalidate>
        <div class="as-setup">

          <!-- Source tabs -->
          <div class="as-source-tabs" role="tablist" aria-label="Work source">
            <button type="button" class="as-source-tab active" data-tab="zip" role="tab" aria-selected="true" aria-controls="asTabZip">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
              Upload ZIP
            </button>
            <button type="button" class="as-source-tab" data-tab="url" role="tab" aria-selected="false" aria-controls="asTabUrl">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>
              Portfolio URL
            </button>
          </div>

          <!-- ZIP panel -->
          <div class="as-source-panel" id="asTabZip" role="tabpanel">
            <div style="display:flex;align-items:center;gap:8px;">
              <label class="studio-file-button" style="min-height:34px;font-size:12.5px;">
                <input id="asZip" type="file" accept=".zip,application/zip" />
                <span id="asZipLabel">Choose ZIP</span>
              </label>
              <small id="asZipName" style="min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:#9097a0;font-size:12.5px;">No file selected</small>
            </div>
          </div>

          <!-- URL panel -->
          <div class="as-source-panel hidden" id="asTabUrl" role="tabpanel">
            <input id="asPortfolioUrl" class="as-url-input" type="url" placeholder="https://yourportfolio.com" autocomplete="url" />
          </div>

          <!-- Style cards -->
          <div class="as-style-cards" role="radiogroup" aria-label="Portfolio style">

            <label class="as-style-card">
              <input type="radio" name="asStyle" value="parallax" checked />
              <div class="as-style-card-inner">
                <!-- Animated Bold thumbnail -->
                <svg class="as-style-thumb" viewBox="0 0 200 78" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect width="200" height="78" fill="#080808"/>
                  <!-- nav bar -->
                  <rect width="200" height="13" fill="#0f0f0f"/>
                  <rect x="10" y="4.5" width="18" height="4" rx="1" fill="#fff" opacity=".9"/>
                  <rect x="158" y="5.5" width="12" height="2" rx="1" fill="rgba(255,255,255,.3)"/>
                  <rect x="174" y="5.5" width="12" height="2" rx="1" fill="rgba(255,255,255,.3)"/>
                  <!-- hero large text -->
                  <rect x="10" y="20" width="118" height="14" rx="1.5" fill="#fff" opacity=".97"/>
                  <rect x="10" y="38" width="170" height="14" rx="1.5" fill="#fff" opacity=".97"/>
                  <!-- orange accent -->
                  <rect x="10" y="58" width="52" height="5" rx="2.5" fill="#ff5200"/>
                  <!-- subtle body lines -->
                  <rect x="10" y="68" width="90" height="2.5" rx="1" fill="rgba(255,255,255,.18)"/>
                  <rect x="10" y="73" width="70" height="2.5" rx="1" fill="rgba(255,255,255,.1)"/>
                  <!-- glow dot -->
                  <circle cx="191" cy="21" r="3.5" fill="#ff5200" opacity=".8"/>
                  <circle cx="191" cy="21" r="6" fill="#ff5200" opacity=".15"/>
                </svg>
                <div class="as-style-meta">
                  <b>Animated Bold</b>
                  <small>Cinematic · scroll-driven · full-bleed</small>
                </div>
              </div>
            </label>

            <label class="as-style-card">
              <input type="radio" name="asStyle" value="straightforward" />
              <div class="as-style-card-inner">
                <!-- Classic Clean thumbnail -->
                <svg class="as-style-thumb" viewBox="0 0 200 78" fill="none" xmlns="http://www.w3.org/2000/svg">
                  <rect width="200" height="78" fill="#f8f7f4"/>
                  <!-- nav -->
                  <rect width="200" height="16" fill="#fff"/>
                  <rect x="10" y="5.5" width="28" height="5" rx="1" fill="#111"/>
                  <rect x="114" y="6.5" width="18" height="3" rx="1" fill="#bbb"/>
                  <rect x="136" y="6.5" width="18" height="3" rx="1" fill="#bbb"/>
                  <rect x="158" y="6.5" width="18" height="3" rx="1" fill="#bbb"/>
                  <!-- section title -->
                  <rect x="10" y="23" width="36" height="4.5" rx="1" fill="#111"/>
                  <!-- 3-col project grid -->
                  <rect x="10" y="32" width="54" height="38" rx="2" fill="#e5e1db"/>
                  <rect x="70" y="32" width="54" height="38" rx="2" fill="#dbd7d0"/>
                  <rect x="130" y="32" width="60" height="38" rx="2" fill="#eeebe4"/>
                  <!-- subtle text under thumbs -->
                  <rect x="10" y="73" width="30" height="2.5" rx="1" fill="#bbb"/>
                  <rect x="70" y="73" width="30" height="2.5" rx="1" fill="#bbb"/>
                  <rect x="130" y="73" width="30" height="2.5" rx="1" fill="#bbb"/>
                </svg>
                <div class="as-style-meta">
                  <b>Classic Clean</b>
                  <small>Grid-based · professional · work-first</small>
                </div>
              </div>
            </label>

          </div>

          <!-- Identity -->
          <div class="as-identity">
            <label>
              <span>Name</span>
              <input id="asName" autocomplete="name" placeholder="Jane Doe" />
            </label>
            <label>
              <span>Job title</span>
              <input id="asTitle" autocomplete="organization-title" placeholder="Creative Director" />
            </label>
            <label>
              <span>LinkedIn <span style="font-weight:600;opacity:.65;">(optional)</span></span>
              <input id="asLinkedin" type="url" autocomplete="url" placeholder="https://linkedin.com/in/janedoe" />
            </label>
          </div>

        </div><!-- /.as-setup -->

        <!-- Prompt bar — Replit-style bottom input -->
        <div class="as-prompt-bar">
          <textarea
            id="asPrompt"
            class="as-prompt-textarea"
            rows="2"
            placeholder="Describe your portfolio vision — style, tone, clients, industries…"
            required
          ></textarea>
          <button id="asSubmit" class="as-prompt-send" type="submit" title="Build portfolio">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
          </button>
        </div>

      </form>
    </section>

    <!-- ── Preview workspace ─────────────────────────────────────────── -->
    <section class="studio-workspace" aria-label="Portfolio preview">
      <header class="studio-topbar">
        <div class="studio-tabs">
          <span class="studio-tab active">Preview</span>
        </div>
        <div class="studio-actions">
          <a id="asOpenEditor" class="studio-icon-link disabled" target="_blank" rel="noreferrer" title="Open code studio">Code</a>
          <a id="asDownload" class="studio-icon-link disabled" title="Download ZIP">ZIP</a>
          <div id="asPublishControl" class="publish-control studio-publish-control hidden" data-publish-domain="killa.work">
            <button type="button" data-publish-toggle>Publish</button>
            <div class="publish-panel hidden" data-publish-panel>
              <form data-publish-form>
                <label>
                  <span>Portfolio URL</span>
                  <div class="publish-url-field">
                    <input data-publish-input type="text" placeholder="your-name" autocomplete="off" />
                    <b>.killa.work</b>
                  </div>
                </label>
                <button data-publish-submit type="submit">Publish</button>
              </form>
              <p class="publish-result hidden" data-publish-result></p>
            </div>
          </div>
        </div>
      </header>

      <div class="studio-browser">
        <div class="studio-browser-bar">
          <span></span><span></span><span></span>
          <b id="asAddress">portfolio preview</b>
        </div>
        <div id="asPreviewEmpty" class="studio-preview-empty">
          <strong class="as-empty-headline">YOUR<br>PORTFOLIO<br>BUILT.</strong>
          <p class="as-empty-sub">Fill in the details on the left and hit send. The AI generates a custom site and loads it here.</p>
        </div>
        <iframe id="asPreview" class="hidden" title="Generated portfolio preview" sandbox="allow-scripts allow-same-origin allow-popups allow-forms"></iframe>
      </div>
    </section>

  </main>

  <script type="module">
    import('/auth.js?v=20260603-ads-base2').then(() => import('/ai-studio.js?v=20260609-ai-studio'));
  </script>
</body>
</html>
