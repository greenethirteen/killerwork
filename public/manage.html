<!doctype html>
<html lang="en" class="auth-pending">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KillaWork™ Project Manager</title>
  <link rel="preload" href="/logos/killa-work-logo.png" as="image" type="image/png" fetchpriority="high" />
  <link rel="stylesheet" href="/ui.css" />
</head>
<body>
  <main class="manager-shell">
    <nav class="topbar manager-topbar" aria-label="KillaWork">
      <a class="logo manager-logo" href="/">
        <img class="logo-image" src="/logos/killa-work-logo.png" alt="KillaWork™ logo" width="612" height="408" loading="eager" decoding="sync" fetchpriority="high" />
        <span class="logo-text">KillaWork™</span>
      </a>
      <div class="topnav-actions">
        <span data-user-badge class="user-badge hidden"></span>
        <a data-auth-link class="auth-button" href="#">Sign up / sign in</a>
        <button data-auth-logout class="auth-button hidden" type="button">Sign out</button>
      </div>
    </nav>
    <header class="manager-header">
      <div>
        <h1>Manage projects</h1>
        <p>Rename the portfolio, open the AI editor, delete unwanted projects, and rebuild the preview and ZIP.</p>
      </div>
    </header>

    <div id="managerStatus" class="editor-status">Loading portfolio...</div>

    <section id="projectList" class="project-manager-list"></section>
  </main>
  <script type="module">
    import('/auth.js?v=20260524-popup').then(() => import('/manage.js?v=20260531-build-dashboard'));
  </script>
</body>
</html>
